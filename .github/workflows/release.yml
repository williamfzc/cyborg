# Release builds tagged Cyborg CLI binaries.
# It packages cross-platform artifacts and publishes them to GitHub Releases.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          mkdir -p dist
          go build -trimpath -o "dist/cyborg${ext}" ./cmd/cyborg

      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          pkg="cyborg-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${pkg}"

          if [ "$GOOS" = "windows" ]; then
            cp dist/cyborg.exe "dist/${pkg}/cyborg.exe"
          else
            cp dist/cyborg "dist/${pkg}/cyborg"
          fi
          cp LICENSE "dist/${pkg}/LICENSE"

          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip -r "${pkg}.zip" "${pkg}")
          else
            tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyborg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cyborg-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh -R "$GITHUB_REPOSITORY" release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh -R "$GITHUB_REPOSITORY" release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh -R "$GITHUB_REPOSITORY" release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
